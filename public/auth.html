<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦁 Aslan - Authentication</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 40px 30px 30px;
            text-align: center;
            position: relative;
        }

        .lion-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
            font-weight: 300;
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            background: transparent;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .form-container {
            padding: 30px;
            background: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .hidden {
            display: none;
        }

        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .forgot-link {
            text-align: center;
            margin-top: 15px;
        }

        .forgot-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-link a:hover {
            text-decoration: underline;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .back-link:hover {
            opacity: 1;
        }

        @media (max-width: 480px) {
            .container {
                margin: 10px;
            }
            
            .form-container {
                padding: 20px;
            }
            
            .header {
                padding: 30px 20px 20px;
            }
            
            .lion-icon {
                font-size: 40px;
            }
            
            .header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-link">← Back to Home</a>
            <div class="lion-icon">🦁</div>
            <h1>Aslan</h1>
            <p>Payment Infrastructure for AI Agents</p>
        </div>

        <div class="tabs">
            <button class="tab active" id="signin-tab">Sign In</button>
            <button class="tab" id="signup-tab">Sign Up</button>
        </div>

        <div class="form-container">
            <div id="message-container"></div>

            <!-- Sign In Form -->
            <div id="signin-form">
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required>
                    </div>

                    <button type="submit" class="button" id="login-btn">
                        <span id="login-text">Sign In</span>
                        <div id="login-loading" class="loading hidden"></div>
                    </button>
                </form>

                <div class="forgot-link">
                    <a href="#" id="forgot-password-link">Forgot your password?</a>
                </div>
            </div>

            <!-- Sign Up Form -->
            <div id="signup-form" class="hidden">
                <form id="register-form">
                    <div class="form-group">
                        <label for="register-name">Full Name</label>
                        <input type="text" id="register-name" required>
                    </div>

                    <div class="form-group">
                        <label for="register-email">Email Address</label>
                        <input type="email" id="register-email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" required minlength="8">
                        <small style="color: #666; font-size: 12px;">Must be at least 8 characters long</small>
                    </div>

                    <div class="form-group">
                        <label for="register-organization">Organization Name (Optional)</label>
                        <input type="text" id="register-organization" placeholder="Your Company">
                    </div>

                    <button type="submit" class="button" id="register-btn">
                        <span id="register-text">Create Account</span>
                        <div id="register-loading" class="loading hidden"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Tab switching
        const signinTab = document.getElementById('signin-tab');
        const signupTab = document.getElementById('signup-tab');
        const signinForm = document.getElementById('signin-form');
        const signupForm = document.getElementById('signup-form');

        signinTab.addEventListener('click', () => {
            signinTab.classList.add('active');
            signupTab.classList.remove('active');
            signinForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            hideMessage();
        });

        signupTab.addEventListener('click', () => {
            signupTab.classList.add('active');
            signinTab.classList.remove('active');
            signupForm.classList.remove('hidden');
            signinForm.classList.add('hidden');
            hideMessage();
        });

        // Message functions
        function showMessage(text, isError = false) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="message ${isError ? 'error' : 'success'}">${text}</div>`;
        }

        function hideMessage() {
            document.getElementById('message-container').innerHTML = '';
        }

        // Loading states
        function setLoading(formType, loading) {
            const text = document.getElementById(`${formType}-text`);
            const loadingEl = document.getElementById(`${formType}-loading`);
            const btn = document.getElementById(`${formType}-btn`);
            
            if (loading) {
                text.textContent = 'Processing...';
                loadingEl.classList.remove('hidden');
                btn.disabled = true;
            } else {
                text.textContent = formType === 'login' ? 'Sign In' : 'Create Account';
                loadingEl.classList.add('hidden');
                btn.disabled = false;
            }
        }

        // Login form
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            setLoading('login', true);
            hideMessage();
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('✅ Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    showMessage(data.error || 'Login failed', true);
                }
            } catch (error) {
                showMessage('Network error. Please try again.', true);
            } finally {
                setLoading('login', false);
            }
        });

        // Register form
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const organizationName = document.getElementById('register-organization').value;
            
            setLoading('register', true);
            hideMessage();
            
            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ 
                        name, 
                        email, 
                        password,
                        organizationName: organizationName || `${name}'s Organization`
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('🎉 Account created! You now have API keys ready to use.');
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 2000);
                } else {
                    showMessage(data.error || 'Registration failed', true);
                }
            } catch (error) {
                showMessage('Network error. Please try again.', true);
            } finally {
                setLoading('register', false);
            }
        });

        // Forgot password (placeholder)
        document.getElementById('forgot-password-link').addEventListener('click', (e) => {
            e.preventDefault();
            showMessage('Password reset feature coming soon. Please contact support if needed.');
        });

        // Check URL parameters for auto-switching
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const action = urlParams.get('action');
            
            if (action === 'signup') {
                signupTab.click();
            }
        });
    </script>
</body>
</html>
